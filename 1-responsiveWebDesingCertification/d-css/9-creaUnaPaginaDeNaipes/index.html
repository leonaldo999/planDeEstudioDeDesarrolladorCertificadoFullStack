<!-- html 2 -->
  <div style="width:100%; max-width:900px;">
    <h1>♠ The Hand ♠</h1>

    <main id="playing-cards">

      <!-- Ace of Spades -->
      <div class="card">
        <div class="left black">
          <span class="rank">A</span>
          <span class="suit-corner">♠</span>
        </div>
        <div class="middle black">
          <span class="suit-lg">♠</span>
        </div>
        <div class="right black">
          <span class="rank">A</span>
          <span class="suit-corner">♠</span>
        </div>
      </div>

      <!-- King of Hearts -->
      <div class="card">
        <div class="left red">
          <span class="rank">K</span>
          <span class="suit-corner">♥</span>
        </div>
        <div class="middle red">
          <span class="suit-lg">♥</span>
          <span
            style="font-family:'Playfair Display',serif; font-size:0.65rem; opacity:0.5; letter-spacing:0.05em;">KING</span>
        </div>
        <div class="right red">
          <span class="rank">K</span>
          <span class="suit-corner">♥</span>
        </div>
      </div>

      <!-- Queen of Diamonds -->
      <div class="card">
        <div class="left red">
          <span class="rank">Q</span>
          <span class="suit-corner">♦</span>
        </div>
        <div class="middle red">
          <span class="suit-lg">♦</span>
          <span
            style="font-family:'Playfair Display',serif; font-size:0.65rem; opacity:0.5; letter-spacing:0.05em;">QUEEN</span>
        </div>
        <div class="right red">
          <span class="rank">Q</span>
          <span class="suit-corner">♦</span>
        </div>
      </div>

      <!-- Jack of Clubs -->
      <div class="card">
        <div class="left black">
          <span class="rank">J</span>
          <span class="suit-corner">♣</span>
        </div>
        <div class="middle black">
          <span class="suit-lg">♣</span>
          <span
            style="font-family:'Playfair Display',serif; font-size:0.65rem; opacity:0.5; letter-spacing:0.05em;">JACK</span>
        </div>
        <div class="right black">
          <span class="rank">J</span>
          <span class="suit-corner">♣</span>
        </div>
      </div>

      <!-- 10 of Hearts -->
      <div class="card">
        <div class="left red">
          <span class="rank" style="font-size:0.9rem;">10</span>
          <span class="suit-corner">♥</span>
        </div>
        <div class="middle red">
          <span class="suit-sm">♥ ♥ ♥</span>
          <span class="suit-sm">♥ ♥ ♥</span>
          <span class="suit-sm">♥ ♥ ♥</span>
          <span class="suit-sm" style="margin-top:1px;">♥</span>
        </div>
        <div class="right red">
          <span class="rank" style="font-size:0.9rem;">10</span>
          <span class="suit-corner">♥</span>
        </div>
      </div>

      <!-- 7 of Spades -->
      <div class="card">
        <div class="left black">
          <span class="rank">7</span>
          <span class="suit-corner">♠</span>
        </div>
        <div class="middle black">
          <span class="suit-sm">♠ ♠ ♠</span>
          <span class="suit-sm">♠</span>
          <span class="suit-sm">♠ ♠ ♠</span>
        </div>
        <div class="right black">
          <span class="rank">7</span>
          <span class="suit-corner">♠</span>
        </div>
      </div>

    </main>
  </div>
  
</body>
