<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Semanal</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <div class="wrap">

    <header>
      <h1>Agenda Semanal</h1>
    </header>

    <div class="toolbar">
      <div class="week-nav">
        <button id="prev">&#8592;</button>
        <span id="week-label"></span>
        <button id="next">&#8594;</button>
      </div>
      <button id="today-btn">Hoy</button>
    </div>

    <div class="table-scroll">
      <table id="sched-table">
        <thead>
          <tr id="header-row"></tr>
        </thead>
        <tbody id="sched-body"></tbody>
      </table>
    </div>

    <div id="legend">
      <span>Disponibilidad</span>
      <div id="legend-gradient"></div>
      <div class="legend-lbl" id="legend-lbl"></div>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3 id="modal-title">Nueva tarea</h3>

      <label for="task-name">Tarea</label>
      <input type="text" id="task-name" placeholder="Ej: Reunión de equipo" autocomplete="off" />

      <label for="task-notes">Notas (opcional)</label>
      <textarea id="task-notes" placeholder="Detalles adicionales..."></textarea>

      <label>Disponibilidad</label>
      <div class="avail-dots" id="avail-dots"></div>

      <div class="modal-actions">
        <button id="cancel-btn">Cancelar</button>
        <button class="primary" id="save-btn">Guardar</button>
      </div>
    </div>
  </div>

  <script src="./index.js"></script>
</body>

</html>
