<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio: Repeat String</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">
    <h1>Laboratorio: Repeat String</h1>

    <div class="description">
      <strong>Objetivo:</strong> Repetir una cadena de texto N veces.
      <br><em>Si el número es ≤ 0, devuelve una cadena vacía.</em>
    </div>

    <!-- Inputs -->
    <div class="input-group">
      <div class="input-wrapper">
        <label for="strInput">String a repetir</label>
        <input type="text" id="strInput" placeholder="Ej: abc" value="abc">
      </div>
      <div class="input-wrapper">
        <label for="numInput">Número de veces</label>
        <input type="number" id="numInput" placeholder="Ej: 3" value="3" min="0">
      </div>
    </div>

    <button id="btnEjecutar">Repetir String</button>

    <!-- Resultado -->
    <div id="resultDisplay" class="result-box">
      Resultado: <span id="resultValue"></span>
    </div>

    <!-- Explicación Paso a Paso -->
    <div id="logContainer" class="steps-log">
      <h3>Registro de Ejecución</h3>
      <p style="color: #777;">Presiona el botón para ver cómo se construye el resultado...</p>
      <div id="stepsList"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>

</html>
