<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio: Chunky Monkey</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <div class="container">
    <h1>Laboratorio: Chunky Monkey</h1>

    <div class="description">
      <strong>Objetivo:</strong> Dividir un array en grupos de una longitud específica y devolver un array
      bidimensional.
      <br><em>Nota: El último grupo puede tener menos elementos si no alcanzan.</em>
    </div>

    <!-- Inputs -->
    <div class="input-group">
      <div class="input-wrapper">
        <label for="arrInput">Array (separado por comas)</label>
        <input type="text" id="arrInput" placeholder="Ej: a,b,c,d,e,f" value="a,b,c,d,e,f">
      </div>
      <div class="input-wrapper">
        <label for="sizeInput">Tamaño por grupo</label>
        <input type="number" id="sizeInput" placeholder="Ej: 2" value="2" min="1">
      </div>
    </div>

    <button id="btnEjecutar">Dividir Array</button>

    <!-- Resultado Visual -->
    <div id="resultDisplay" class="result-box">
      El resultado es: <span id="resultValue"></span>
    </div>

    <!-- Explicación Paso a Paso -->
    <div id="logContainer" class="steps-log">
      <h3>Registro de Ejecución</h3>
      <p style="color: #777;">Presiona el botón para ver cómo el código divide cada grupo...</p>
      <div id="stepsList"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>

</html>
